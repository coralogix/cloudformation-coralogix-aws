AWSTemplateFormatVersion: 2010-09-09
Description: |
  Create an eBPF Profiler ECS Daemon Service on an ECS Cluster.
  This template uses an S3-hosted OpenTelemetry Collector configuration.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Basic Configuration"
        Parameters:
          - ClusterName
          - CoralogixRegion
          - CoralogixApiKey
          - ProfilerImageMode
          - EbpfProfilerImageRepository
          - EbpfProfilerImageVersion
          - SupervisedImageRepository
          - SupervisedImageVersion
      - Label:
          default: "S3 Configuration"
        Parameters:
          - S3ConfigBucket
          - S3ConfigKey
          - S3SupervisorConfigKey
    ParameterLabels:
      ClusterName:
        default: "ECS Cluster Name"
      CoralogixRegion:
        default: "Coralogix Region"
      CoralogixApiKey:
        default: "Coralogix API Key"
      ProfilerImageMode:
        default: "Profiler Image Mode"
      EbpfProfilerImageRepository:
        default: "eBPF Profiler Image Repository"
      EbpfProfilerImageVersion:
        default: "eBPF Profiler Image Version"
      SupervisedImageRepository:
        default: "Supervised Image Repository"
      SupervisedImageVersion:
        default: "Supervised Image Version"
      S3ConfigBucket:
        default: "S3 Bucket Name"
      S3ConfigKey:
        default: "S3 Object Key (file path)"
      S3SupervisorConfigKey:
        default: "S3 Supervisor Config Key"

Parameters:
  ClusterName:
    Type: String
    Description: Name of an existing ECS cluster
    AllowedPattern: ".+"
    ConstraintDescription: ECS cluster name is required.

  CoralogixRegion:
    Type: String
    Description: "The Coralogix location region [EU1|EU2|AP1|AP2|AP3|US1|US2]"
    AllowedValues:
      - EU1
      - EU2
      - AP1
      - AP2
      - AP3
      - US1
      - US2

  CoralogixApiKey:
    Type: String
    Description: The Send-Your-Data API key for your Coralogix account
    NoEcho: true
    AllowedPattern: ".+"
    ConstraintDescription: API key is required.

  ProfilerImageMode:
    Type: String
    Description: Choose which eBPF profiler image type to run
    AllowedValues:
      - collector
      - supervised
    Default: collector

  EbpfProfilerImageRepository:
    Type: String
    Description: eBPF profiler collector image repository
    Default: coralogixrepo/coralogix-otel-collector
    AllowedPattern: ".+"
    ConstraintDescription: Collector image repository is required.

  EbpfProfilerImageVersion:
    Type: String
    Description: eBPF profiler collector image version/tag
    Default: v0.5.8
    AllowedPattern: ".+"
    ConstraintDescription: Image version is required.

  SupervisedImageRepository:
    Type: String
    Description: supervised eBPF profiler image repository
    Default: cgx.jfrog.io/coralogix-docker-images/coralogix-otel-supervised-cdot
    AllowedPattern: ".+"
    ConstraintDescription: Supervised image repository is required.

  SupervisedImageVersion:
    Type: String
    Description: supervised eBPF profiler image version/tag
    Default: v0.0.1
    AllowedPattern: ".+"
    ConstraintDescription: Supervised image version is required.

  S3ConfigBucket:
    Type: String
    Description: S3 bucket name containing the collector configuration file
    AllowedPattern: ".+"
    ConstraintDescription: S3 bucket name is required.

  S3ConfigKey:
    Type: String
    Description: S3 object key (file path) for the collector configuration file
    AllowedPattern: ".+"
    ConstraintDescription: S3 object key is required.

  S3SupervisorConfigKey:
    Type: String
    Description: S3 object key (file path) for the supervisor configuration file
    Default: configs/ebpf-profiler-supervisor-config.yaml
    AllowedPattern: ".+"
    ConstraintDescription: S3 supervisor config key is required.

Conditions:
  UseSupervisedImage: !Equals [!Ref ProfilerImageMode, supervised]

Mappings:
  CoralogixRegionMap:
    EU1:
      Domain: coralogix.com
    EU2:
      Domain: eu2.coralogix.com
    AP1:
      Domain: coralogix.in
    AP2:
      Domain: coralogixsg.com
    AP3:
      Domain: ap3.coralogix.com
    US1:
      Domain: coralogix.us
    US2:
      Domain: cx498.coralogix.com

Resources:
  EbpfTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      ExecutionRoleArn: !Ref EbpfTaskExecutionRole
      TaskRoleArn: !Ref EbpfTaskRole
      Family: ebpf-profiler
      RequiresCompatibilities:
        - EC2
      NetworkMode: host
      PidMode: host
      Volumes:
        - Name: otel-config
        - Name: procfs
          Host:
            SourcePath: /proc
        - Name: sysfs
          Host:
            SourcePath: /sys
        - Name: cgroupfs
          Host:
            SourcePath: /sys/fs/cgroup
        - Name: debugfs
          Host:
            SourcePath: /sys/kernel/debug

      ContainerDefinitions:
        - Name: config-loader
          Essential: false
          MemoryReservation: 32
          Image: public.ecr.aws/aws-cli/aws-cli:2.28.17
          EntryPoint:
            - sh
            - -c
          Command:
            - !If
              - UseSupervisedImage
              - !Sub "aws s3 cp s3://${S3ConfigBucket}/${S3ConfigKey} /otel-config/collector-config.yaml && aws s3 cp s3://${S3ConfigBucket}/${S3SupervisorConfigKey} /otel-config/supervisor.yaml"
              - !Sub "aws s3 cp s3://${S3ConfigBucket}/${S3ConfigKey} /otel-config/collector-config.yaml"
          MountPoints:
            - SourceVolume: otel-config
              ContainerPath: /otel-config

        - Name: coralogix-ebpf-profiler
          Cpu: 0
          Memory: 512
          EntryPoint:
            - sh
            - -c
          Command:
            - !If
              - UseSupervisedImage
              - "mkdir -p /sys/kernel/debug /sys/kernel/tracing && mount -t debugfs debugfs /sys/kernel/debug 2>/dev/null || true; mount -t tracefs tracefs /sys/kernel/tracing 2>/dev/null || true; exec /opampsupervisor -config /otel-config/supervisor.yaml"
              - "mkdir -p /sys/kernel/debug /sys/kernel/tracing && mount -t debugfs debugfs /sys/kernel/debug 2>/dev/null || true; mount -t tracefs tracefs /sys/kernel/tracing 2>/dev/null || true; exec /cdot --feature-gates=service.profilesSupport --config /otel-config/collector-config.yaml"
          Image: !If
            - UseSupervisedImage
            - !Sub "${SupervisedImageRepository}:${SupervisedImageVersion}"
            - !Sub "${EbpfProfilerImageRepository}:${EbpfProfilerImageVersion}"
          Essential: true
          Privileged: true
          DependsOn:
            - ContainerName: config-loader
              Condition: SUCCESS
          MountPoints:
            - SourceVolume: otel-config
              ContainerPath: /otel-config
              ReadOnly: true
            - SourceVolume: procfs
              ContainerPath: /hostfs/proc
              ReadOnly: true
            - SourceVolume: sysfs
              ContainerPath: /hostfs/sys
              ReadOnly: true
            - SourceVolume: cgroupfs
              ContainerPath: /hostfs/sys/fs/cgroup
              ReadOnly: true
            - SourceVolume: debugfs
              ContainerPath: /hostfs/sys/kernel/debug
              ReadOnly: true
          Environment:
            - Name: CORALOGIX_DOMAIN
              Value: !FindInMap [ CoralogixRegionMap, !Ref CoralogixRegion, Domain ]
            - Name: CORALOGIX_PRIVATE_KEY
              Value: !Ref CoralogixApiKey

  EbpfTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-ebpf-task-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  EbpfTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-ebpf-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub "arn:aws:s3:::${S3ConfigBucket}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::${S3ConfigBucket}"

  ECSService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref ClusterName
      LaunchType: EC2
      ServiceName: coralogix-ebpf-profiler
      SchedulingStrategy: DAEMON
      DeploymentConfiguration:
        MaximumPercent: 100
        MinimumHealthyPercent: 0
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      DeploymentController:
        Type: ECS
      ServiceConnectConfiguration:
        Enabled: false
      PlacementStrategies: []
      PlacementConstraints: []
      EnableECSManagedTags: true
      Tags:
        - Key: ecs:service:stackId
          Value: !Ref AWS::StackId
      TaskDefinition: !Ref EbpfTaskDefinition

Outputs:
  ServiceName:
    Description: ECS service name
    Value: coralogix-ebpf-profiler

  ServiceArn:
    Description: ECS service ARN
    Value: !Ref ECSService
