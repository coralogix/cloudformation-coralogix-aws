AWSTemplateFormatVersion: 2010-09-09
Description: |
  Deploy the Coralogix OpenTelemetry Collector as a Daemon ECS service on an existing
  Windows ECS EC2 cluster (WINDOWS_SERVER_2022_CORE). One agent task per Windows instance.
  Uses awsvpc network mode; requires subnet and security group IDs.
  Config source: template (default), S3, or Parameter Store.
  Template version: 2.0.1

Parameters:
  ClusterName:
    Type: String
    Description: Name of the existing Windows ECS cluster.

  SubnetIds:
    Type: CommaDelimitedList
    Description: Subnet IDs for the ECS service (awsvpc). Use private subnets where Windows ECS instances run.

  SecurityGroupIds:
    Type: CommaDelimitedList
    Description: Security group IDs for the ECS service. Must allow outbound and agent ports (e.g. OTLP 4317).

  ConfigSource:
    Type: String
    Default: template
    AllowedValues:
      - template
      - s3
      - parameter-store
    Description: Configuration source for the collector (template = built-in, s3 = S3 object, parameter-store = SSM Parameter).

  CDOTImageVersion:
    Type: String
    Default: v0.5.10-windowsserver-2022
    Description: |
      OTEL Collector image tag. Use a Windows Server tag, e.g. v0.5.10-windowsserver-2022.
      See https://hub.docker.com/r/coralogixrepo/coralogix-otel-collector/tags

  Image:
    Type: String
    Default: ""
    Description: Override image repository. If empty, coralogixrepo/coralogix-otel-collector is used with CDOTImageVersion.

  CoralogixRegion:
    Type: String
    Description: Coralogix region [EU1|EU2|AP1|AP2|AP3|US1|US2|custom].
    AllowedValues:
      - EU1
      - EU2
      - AP1
      - AP2
      - AP3
      - US1
      - US2
      - custom

  CustomDomain:
    Type: String
    Default: ""
    Description: Coralogix custom domain (e.g. private link). Required when CoralogixRegion is custom.

  CoralogixApiKey:
    Type: String
    NoEcho: true
    Description: Send-Your-Data API key. Required unless UseApiKeySecret is true.

  UseApiKeySecret:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Use API key from Secrets Manager.

  ApiKeySecretArn:
    Type: String
    Default: ""
    Description: ARN of the secret containing the API key. Required when UseApiKeySecret is true.

  TaskExecutionRoleArn:
    Type: String
    Default: ""
    Description: |
      Optional. Task execution role for ECR and CloudWatch Logs. If empty, a role is created.
      When using API Key Secret or Parameter Store config, you must provide a role with secrets/SSM access.

  TaskRoleArn:
    Type: String
    Default: ""
    Description: |
      Optional task role for runtime (e.g. S3 config). If empty and ConfigSource is s3, a minimal S3 read role is created.

  S3ConfigBucket:
    Type: String
    Default: ""
    Description: S3 bucket name for config. Required when ConfigSource is s3.

  S3ConfigKey:
    Type: String
    Default: ""
    Description: S3 object key for config. Required when ConfigSource is s3.

  CustomConfigParameterStoreName:
    Type: String
    Default: ""
    Description: SSM Parameter Store name for OTEL config. Required when ConfigSource is parameter-store.

  DefaultApplicationName:
    Type: String
    Default: otel
    Description: Default Coralogix application name (template config).

  DefaultSubsystemName:
    Type: String
    Default: ecs-ec2
    Description: Default Coralogix subsystem name (template config).

  Cpu:
    Type: Number
    Default: 1024
    Description: Task CPU units (1024 = 1 vCPU).

  Memory:
    Type: Number
    Default: 2048
    Description: Task memory (MiB).

  CloudWatchLogGroupName:
    Type: String
    Default: ""
    Description: CloudWatch log group name. If empty, a log group is created.

  CloudwatchLogRetentionDays:
    Type: Number
    Default: 7
    Description: Retention in days for the created log group.

  ServiceDiscoveryRegistryArn:
    Type: String
    Default: ""
    Description: Optional Cloud Map service ARN so other tasks can reach the agent via DNS (e.g. agent.otel.local:4317).

  HealthCheckEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: "Enable ECS container health check (Windows: CMD /C exit 0)."

  HealthCheckInterval:
    Type: Number
    Default: 30
    Description: Health check interval (seconds).

  HealthCheckTimeout:
    Type: Number
    Default: 5
    Description: Health check timeout (seconds).

  HealthCheckRetries:
    Type: Number
    Default: 3
    Description: Health check retries.

  HealthCheckStartPeriod:
    Type: Number
    Default: 10
    Description: Health check start period (seconds).

  EnableHeadSampler:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Enable head sampling for traces (template config).

  SamplingPercentage:
    Type: Number
    Default: 10
    Description: Sampling percentage 0-100 (template config).

  SamplerMode:
    Type: String
    Default: proportional
    AllowedValues:
      - proportional
      - equalizing
      - hash_seed
    Description: Sampler mode (template config).

  EnableSpanMetrics:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Enable span metrics (template config).

  EnableTracesDB:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable traces/db pipeline (template config).

  PrivateKeyConfigLiteral:
    Type: String
    Default: '${env:CORALOGIX_PRIVATE_KEY}'
    Description: "(Internal) Full literal for OTEL config private_key line. Do not change."

Conditions:
  UseImage: !Not [!Equals [!Ref Image, ""]]
  ConfigSourceTemplate: !Equals [!Ref ConfigSource, "template"]
  ConfigSourceS3: !Equals [!Ref ConfigSource, "s3"]
  ConfigSourceParameterStore: !Equals [!Ref ConfigSource, "parameter-store"]
  UseApiKeySecret: !Equals [!Ref UseApiKeySecret, "true"]
  UseCustomTaskRole: !Not [!Equals [!Ref TaskRoleArn, ""]]
  CreateTaskRole: !And [!Condition ConfigSourceS3, !Equals [!Ref TaskRoleArn, ""]]
  CreateExecutionRole: !Equals [!Ref TaskExecutionRoleArn, ""]
  CreateLogGroup: !Equals [!Ref CloudWatchLogGroupName, ""]
  EnableHealthCheck: !Equals [!Ref HealthCheckEnabled, "true"]
  UseServiceDiscovery: !Not [!Equals [!Ref ServiceDiscoveryRegistryArn, ""]]
  UseCustomDomain: !Equals [!Ref CoralogixRegion, "custom"]

Mappings:
  CoralogixRegionMap:
    EU1:
      Domain: eu1.coralogix.com
    EU2:
      Domain: eu2.coralogix.com
    AP1:
      Domain: ap1.coralogix.com
    AP2:
      Domain: ap2.coralogix.com
    AP3:
      Domain: ap3.coralogix.com
    US1:
      Domain: us1.coralogix.com
    US2:
      Domain: us2.coralogix.com

Resources:
  OtelLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: CreateLogGroup
    Properties:
      LogGroupName: !Sub "/ecs/coralogix-otel-agent-${AWS::StackName}"
      RetentionInDays: !Ref CloudwatchLogRetentionDays

  OtelTaskExecutionRole:
    Type: AWS::IAM::Role
    Condition: CreateExecutionRole
    Properties:
      RoleName: !Sub "${AWS::StackName}-otel-task-execution"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  OtelTaskRole:
    Type: AWS::IAM::Role
    Condition: CreateTaskRole
    Properties:
      RoleName: !Sub "${AWS::StackName}-otel-task-role-s3"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub "arn:aws:s3:::${S3ConfigBucket}/*"

  OtelTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "coralogix-otel-agent-${AWS::StackName}"
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - EC2
      ExecutionRoleArn: !If
        - CreateExecutionRole
        - !Ref OtelTaskExecutionRole
        - !Ref TaskExecutionRoleArn
      TaskRoleArn: !If
        - UseCustomTaskRole
        - !Ref TaskRoleArn
        - !If
          - CreateTaskRole
          - !Ref OtelTaskRole
          - !Ref AWS::NoValue
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: WINDOWS_SERVER_2022_CORE
      Volumes:
        - Name: hostfs
          Host:
            SourcePath: "C:\\"
        - Name: programdata
          Host:
            SourcePath: "C:\\ProgramData\\Amazon\\ECS"
      ContainerDefinitions:
        - Name: coralogix-otel-agent
          Image: !If
            - UseImage
            - !Sub "${Image}:${CDOTImageVersion}"
            - !Sub "coralogixrepo/coralogix-otel-collector:${CDOTImageVersion}"
          Cpu: !Ref Cpu
          Memory: !Ref Memory
          Essential: true
          Privileged: false
          PortMappings:
            - ContainerPort: 4317
              HostPort: 4317
              AppProtocol: grpc
            - ContainerPort: 4318
              HostPort: 4318
            - ContainerPort: 8888
              HostPort: 8888
            - ContainerPort: 13133
              HostPort: 13133
            - ContainerPort: 14250
              HostPort: 14250
            - ContainerPort: 14268
              HostPort: 14268
            - ContainerPort: 6831
              HostPort: 6831
              Protocol: udp
            - ContainerPort: 6832
              HostPort: 6832
              Protocol: udp
            - ContainerPort: 8125
              HostPort: 8125
              Protocol: udp
            - ContainerPort: 9411
              HostPort: 9411
          MountPoints:
            - SourceVolume: hostfs
              ContainerPath: "C:\\hostfs"
              ReadOnly: true
            - SourceVolume: programdata
              ContainerPath: "C:\\ProgramData\\Amazon\\ECS"
              ReadOnly: true
          Environment:
            - Name: MY_POD_IP
              Value: "0.0.0.0"
            - Name: OTEL_CFG_VERSION
              Value: "2"
            - Name: OTEL_CONFIG
              Value: !If
                - ConfigSourceTemplate
                - !Sub
                  - |
                    receivers:
                      awsecscontainermetricsd:
                        sidecar: true
                      otlp:
                        protocols:
                          grpc:
                            endpoint: 0.0.0.0:4317
                          http:
                            endpoint: 0.0.0.0:4318
                      prometheus:
                        config:
                          scrape_configs:
                            - job_name: opentelemetry-collector
                              scrape_interval: 30s
                              static_configs:
                                - targets: ["0.0.0.0:8888"]
                    processors:
                      batch: {}
                      resourcedetection/env:
                        detectors: [env]
                        timeout: 2s
                      resourcedetection/ec2:
                        detectors: [ec2]
                        timeout: 2s
                    exporters:
                      coralogix:
                        domain: ${CoralogixDomain}
                        private_key: ${PrivateKeyConfigLiteral}
                        application_name: ${ApplicationName}
                        subsystem_name: ${SubsystemName}
                        timeout: 60s
                    service:
                      pipelines:
                        metrics:
                          receivers: [awsecscontainermetricsd, prometheus, otlp]
                          processors: [resourcedetection/ec2, resourcedetection/env, batch]
                          exporters: [coralogix]
                        traces:
                          receivers: [otlp]
                          processors: [batch]
                          exporters: [coralogix]
                        logs:
                          receivers: [otlp]
                          processors: [batch]
                          exporters: [coralogix]
                      telemetry:
                        metrics:
                          readers:
                            - pull:
                                exporter:
                                  prometheus:
                                    host: 0.0.0.0
                                    port: 8888
                  - CoralogixDomain: !If
                      - UseCustomDomain
                      - !Ref CustomDomain
                      - !FindInMap
                        - CoralogixRegionMap
                        - !Ref CoralogixRegion
                        - Domain
                    ApplicationName: !Ref DefaultApplicationName
                    SubsystemName: !Ref DefaultSubsystemName
                    PrivateKeyConfigLiteral: !Ref PrivateKeyConfigLiteral
                - !Ref AWS::NoValue
            - Name: CORALOGIX_PRIVATE_KEY
              Value: !If
                - UseApiKeySecret
                - !Ref AWS::NoValue
                - !Ref CoralogixApiKey
          Secrets: !If
            - ConfigSourceParameterStore
            - !If
              - UseApiKeySecret
              - - Name: OTEL_CONFIG
                  ValueFrom: !Ref CustomConfigParameterStoreName
                - Name: CORALOGIX_PRIVATE_KEY
                  ValueFrom: !Ref ApiKeySecretArn
              - - Name: OTEL_CONFIG
                  ValueFrom: !Ref CustomConfigParameterStoreName
            - !If
              - UseApiKeySecret
              - - Name: CORALOGIX_PRIVATE_KEY
                  ValueFrom: !Ref ApiKeySecretArn
              - []
          Command: !If
            - ConfigSourceS3
            - - "--config"
              - !Sub "s3://${S3ConfigBucket}.s3.${AWS::Region}.amazonaws.com/${S3ConfigKey}"
              - "--feature-gates=service.profilesSupport"
            - - "--config"
              - "env:OTEL_CONFIG"
              - "--feature-gates=service.profilesSupport"
          HealthCheck: !If
            - EnableHealthCheck
            - Command:
                - "CMD"
                - "/C"
                - "exit"
                - "0"
              Interval: !Ref HealthCheckInterval
              Timeout: !Ref HealthCheckTimeout
              Retries: !Ref HealthCheckRetries
              StartPeriod: !Ref HealthCheckStartPeriod
            - !Ref AWS::NoValue
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !If
                - CreateLogGroup
                - !Ref OtelLogGroup
                - !Ref CloudWatchLogGroupName
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  ECSService:
    Type: AWS::ECS::Service
    DependsOn: OtelTaskDefinition
    Properties:
      ServiceName: coralogix-otel-agent
      Cluster: !Ref ClusterName
      LaunchType: EC2
      SchedulingStrategy: DAEMON
      TaskDefinition: !Ref OtelTaskDefinition
      DeploymentConfiguration:
        MaximumPercent: 100
        MinimumHealthyPercent: 0
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      DeploymentController:
        Type: ECS
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref SubnetIds
          SecurityGroups: !Ref SecurityGroupIds
          AssignPublicIp: DISABLED
      ServiceRegistries: !If
        - UseServiceDiscovery
        - - RegistryArn: !Ref ServiceDiscoveryRegistryArn
            ContainerName: coralogix-otel-agent
        - []
      EnableECSManagedTags: true

Outputs:
  CoralogixOtelAgentServiceId:
    Description: ECS service ID of the OTEL agent Daemon
    Value: !Ref ECSService
    Export:
      Name: !Sub "${AWS::StackName}-CoralogixOtelAgentServiceId"

  CoralogixOtelAgentTaskDefinitionArn:
    Description: Task definition ARN of the OTEL agent
    Value: !Ref OtelTaskDefinition
    Export:
      Name: !Sub "${AWS::StackName}-CoralogixOtelAgentTaskDefinitionArn"

  CloudWatchLogGroupName:
    Description: CloudWatch log group name used by the agent
    Value: !If
      - CreateLogGroup
      - !Ref OtelLogGroup
      - !Ref CloudWatchLogGroupName
    Export:
      Name: !Sub "${AWS::StackName}-CloudWatchLogGroupName"
