AWSTemplateFormatVersion: 2010-09-09
Description: |
  Create an example task definition for ECS Fargate including Opentelemetry Collector.
  NOTE: Contains example IAM roles, adjust as needed for your existing applications. 

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Basic Configuration"
        Parameters:
          - AwsPlatform
          - CoralogixRegion
          - CoralogixApiKey
      
      - Label:
          default: "S3 Configuration"
        Parameters:
          - S3ConfigBucket
          - S3ConfigKey
      
      - Label:
          default: "Container Configuration"
        Parameters:
          - Image
          - Memory
      
      - Label:
          default: "Health Check Configuration"
        Parameters:
          - HealthCheckEnabled
          - HealthCheckInterval
          - HealthCheckTimeout
          - HealthCheckRetries
          - HealthCheckStartPeriod
    
    ParameterLabels:
      AwsPlatform:
        default: "AWS platform (Standard or GovCloud)"
      S3ConfigBucket:
        default: "S3 Bucket Name"
      S3ConfigKey:
        default: "S3 Object Key (file path)"

      CoralogixRegion:
        default: "Coralogix Region"
      CoralogixApiKey:
        default: "Coralogix API Key"
      Image:
        default: "Image URI"
      Memory:
        default: "Memory (MiB)"
      HealthCheckEnabled:
        default: "Enable Health Check"
      HealthCheckInterval:
        default: "Health Check Interval (seconds)"
      HealthCheckTimeout:
        default: "Health Check Timeout (seconds)"
      HealthCheckRetries:
        default: "Health Check Retries"
      HealthCheckStartPeriod:
        default: "Health Check Start Period (seconds)"

Parameters:
  AwsPlatform:
    Type: String
    Description: >-
      Standard AWS (commercial regions) or AWS GovCloud (us-gov-west-1 / us-gov-east-1).
      Must match where you deploy this stack; validation uses the stack partition.
    AllowedValues:
      - Standard
      - AWSGovCloud
    Default: Standard

  S3ConfigBucket:
    Type: String
    Description: |
      S3 bucket name containing the configuration file.
      Example: 'my-bucket'
    AllowedPattern: ".+"
    ConstraintDescription: "S3 bucket name is required."

  S3ConfigKey:
    Type: String
    Description: |
      S3 object key (file path) for the configuration file.
      Example: 'configs/otel-config.yaml'
    AllowedPattern: ".+"
    ConstraintDescription: "S3 object key is required."
 
  Image:
    Description: |
      The OpenTelemetry Collector Image to use. Defaults to latest dockerhub image.
    Default: "otel/opentelemetry-collector-contrib:0.147.0"
    Type: String

  Memory:
    Description: |
      The amount of memory (in MiB) used by the task.
      Note that your cluster must have sufficient memory available to support the given value.
    Type: Number
    Default: 2048

  CoralogixRegion:
      Type: String
      Description: "The Coralogix location region [EU1|EU2|AP1|AP2|AP3|US1|US2]"
      AllowedValues:
        - EU1
        - EU2
        - AP1
        - AP2
        - AP3
        - US1
        - US2

  CoralogixApiKey:
    Type: String
    Description: "The Send-Your-Data API key for your Coralogix account. See: https://coralogix.com/docs/user-guides/account-management/api-keys/send-your-data-api-key/"
    NoEcho: true
    AllowedPattern: ".+"
    ConstraintDescription: "API Key required."

  HealthCheckEnabled:
    Type: String
    Description: Enable ECS container health check for the OTEL agent container.
    AllowedValues: ["true", "false"]
    Default: "false"

  HealthCheckInterval:
    Type: Number
    Description: Health check interval (seconds). Only used if HealthCheckEnabled is true
    Default: "30"

  HealthCheckTimeout:
    Type: Number
    Description: Health check timeout (seconds). Only used if HealthCheckEnabled is true
    Default: "5"

  HealthCheckRetries:
    Type: Number
    Description: Health check retries. Only used if HealthCheckEnabled is true
    Default: "3"

  HealthCheckStartPeriod:
    Type: Number
    Description: Health check start period (seconds). Only used if HealthCheckEnabled is true
    Default: "10"

Rules:
  AwsPlatformMatchesGovCloud:
    RuleCondition: !Equals [!Ref AwsPlatform, AWSGovCloud]
    Assertions:
      - Assert:
          Fn::Equals:
            - Ref: AWS::Partition
            - aws-us-gov
        AssertDescription: >-
          AwsPlatform AWSGovCloud requires deploying this stack in an AWS GovCloud region
          (partition aws-us-gov).
  AwsPlatformMatchesStandard:
    RuleCondition: !Equals [!Ref AwsPlatform, Standard]
    Assertions:
      - Assert:
          Fn::Not:
            - Fn::Equals:
                - Ref: AWS::Partition
                - aws-us-gov
        AssertDescription: >-
          AwsPlatform Standard is for non-GovCloud partitions. Use AWSGovCloud when
          deploying to us-gov-west-1 or us-gov-east-1.

Conditions:
  EnableHealthCheck: !Equals [!Ref HealthCheckEnabled, "true"]

Mappings:
  CoralogixRegionMap:
    EU1:
      Endpoint: ingress.coralogix.com:443
      Domain: coralogix.com
    EU2:
      Endpoint: ingress.eu2.coralogix.com:443
      Domain: eu2.coralogix.com
    AP1:
      Endpoint: ingress.coralogix.in:443
      Domain: coralogix.in
    AP2:
      Endpoint: ingress.coralogixsg.com:443
      Domain: coralogixsg.com
    AP3:
      Endpoint: ingress.ap3.coralogix.com:443
      Domain: ap3.coralogix.com
    US1:
      Endpoint: ingress.coralogix.us:443
      Domain: coralogix.us
    US2:
      Endpoint: ingress.cx498.coralogix.com:443
      Domain: cx498.coralogix.com

Resources:
  ECSTaskDefinition:
    Type: 'AWS::ECS::TaskDefinition'
    Properties:
      Family: CX-Example-TaskDefinition
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      NetworkMode: awsvpc
      ContainerDefinitions:
        - Name: existing-frontend-application-example
          Image: mikebriggs2k/weather-frontend:latest
          Cpu: 0
          PortMappings:
            - ContainerPort: 5000
              HostPort: 5000
              Protocol: tcp
          Essential: true
          Environment:
            - Name: OTEL_SERVICE_NAME
              Value: ecs-fargate            
          MountPoints: []
          VolumesFrom: []
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: otel-collector
        - Name: load-generator-for-example
          Image: mikebriggs2k/traffic-generator:latest
          Cpu: 0
          PortMappings: []
          Essential: true
          Environment:
            - Name: OTEL_SERVICE_NAME
              Value: ecs-fargate            
          MountPoints: []
          VolumesFrom: []
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: otel-collector
        - Name: otel-collector
          Image: !Ref Image
          Cpu: 0
          PortMappings:
            - ContainerPort: 4317
              HostPort: 4317
              Protocol: tcp
              AppProtocol: grpc
            - ContainerPort: 4318
              HostPort: 4318
              Protocol: tcp
          Essential: false
          Command: ["--config", !Sub "s3://${S3ConfigBucket}.s3.${AWS::Region}.amazonaws.com/${S3ConfigKey}"]
          Environment:
            - Name: CORALOGIX_DOMAIN
              Value: !FindInMap [CoralogixRegionMap, !Ref CoralogixRegion, Domain]
            - Name: CORALOGIX_PRIVATE_KEY
              Value: !Ref CoralogixApiKey
          HealthCheck: !If
            - EnableHealthCheck
            - Command:
                - "/healthcheck"
              Interval: !Ref HealthCheckInterval
              Timeout: !Ref HealthCheckTimeout
              Retries: !Ref HealthCheckRetries
              StartPeriod: !Ref HealthCheckStartPeriod
            - !Ref AWS::NoValue
          MountPoints: []
          VolumesFrom: []
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: otel-collector
          FirelensConfiguration:
            Type: fluentbit

      RequiresCompatibilities:
        - FARGATE
      Cpu: 1024
      Memory: !Ref Memory

  ECSTaskExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      Description: >-
        Allows ECS container agent to make calls to the Amazon ECS API on your
        behalf.
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Sid: ''
            Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub "arn:${AWS::Partition}:s3:::${S3ConfigBucket}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub "arn:${AWS::Partition}:s3:::${S3ConfigBucket}"
      RoleName: !Sub 'cx-ECSTaskExecutionRole-${AWS::StackName}'

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'cx-ECSTaskRole-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub "arn:${AWS::Partition}:s3:::${S3ConfigBucket}/*"